name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Engine has zero runtime deps — no install needed for unit tests.
      - name: Unit tests
        run: node --test
      - name: Format check (test files)
        run: npm run lint
